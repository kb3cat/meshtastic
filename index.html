<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KB3CAT MHSPA MQTT Gateway</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; background:#111; color:#eee;}
#map { height:100vh; width:100%; }
.header {
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:1000;
  background:#1a1a1a;
  padding:10px 15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
KB3CAT MHSPA MQTT Gateway
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([40.1,-77.1],9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers = {};

async function updateNodes(){

const res = await fetch("nodes.json?_="+Date.now());
const data = await res.json();

data.nodes.forEach(node => {

if(!node.lat || !node.lon) return;

if(markers[node.id]){

markers[node.id].setLatLng([node.lat,node.lon]);

}else{

markers[node.id] = L.marker([node.lat,node.lon])
.addTo(map)
.bindPopup(
  `<b>${node.long_name || node.short_name || node.id}</b><br>
   ID: ${node.id}<br>
   Lat: ${node.lat}<br>
   Lon: ${node.lon}`
);

}

});

}

updateNodes();
setInterval(updateNodes,5000);

</script>

</body>
</html>
